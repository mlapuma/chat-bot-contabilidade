services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot-contabilidade-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_contabilidade}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot_contabilidade}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chatbot-contabilidade-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chatbot_contabilidade}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-chatbot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - generated_files:/app/generated

volumes:
  postgres_data:
  generated_files:
