spring:
  application:
    name: chatbot-contabilidade
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatbot_contabilidade}
    username: ${SPRING_DATASOURCE_USERNAME:chatbot}
    password: ${SPRING_DATASOURCE_PASSWORD:chatbot123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    br.com.contabilidade.chatbot: INFO

whatsapp:
  cloud:
    enabled: ${WHATSAPP_CLOUD_ENABLED:false}
    api-version: ${WHATSAPP_CLOUD_API_VERSION:v23.0}
    phone-number-id: ${WHATSAPP_CLOUD_PHONE_NUMBER_ID:}
    access-token: ${WHATSAPP_CLOUD_ACCESS_TOKEN:}
    verify-token: ${WHATSAPP_CLOUD_VERIFY_TOKEN:chatbot-contabilidade-local}
